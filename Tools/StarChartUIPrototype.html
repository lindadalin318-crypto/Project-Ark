<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Ark — Star Chart UI Prototype v2</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:        #060a10;
  --bg-panel:       #0b1120;
  --bg-track:       #0f1828;
  --bg-slot:        #0d1828;
  --bg-slot-hover:  #162338;
  --cyan:           #00e5ff;
  --cyan-dim:       #0097a7;
  --cyan-glow:      rgba(0,229,255,0.15);
  --cyan-glow-soft: rgba(0,229,255,0.07);
  --purple:         #8b5cf6;
  --purple-dim:     #3b1f6e;
  --purple-glow:    rgba(139,92,246,0.25);
  --blue:           #2563eb;
  --blue-dim:       #1a3060;
  --blue-glow:      rgba(37,99,235,0.25);
  --green:          #22c55e;
  --orange:         #f97316;
  --red:            #ef4444;
  /* Type accent colors */
  --col-sail:       #34d399;
  --col-sail-dim:   #0d3d28;
  --col-sail-glow:  rgba(52,211,153,0.22);
  --col-prism:      #a78bfa;
  --col-prism-dim:  #3b1f6e;
  --col-prism-glow: rgba(167,139,250,0.22);
  --col-core:       #60a5fa;
  --col-core-dim:   #1a3060;
  --col-core-glow:  rgba(96,165,250,0.22);
  --col-sat:        #fbbf24;
  --col-sat-dim:    #3d2a00;
  --col-sat-glow:   rgba(251,191,36,0.22);
  --text-primary:   #dde6f0;
  --text-dim:       #4a6080;
  --text-cyan:      #67e8f9;
  --border:         rgba(0,229,255,0.10);
  --border-mid:     rgba(0,229,255,0.22);
  --border-bright:  rgba(0,229,255,0.45);
  --slot-size:      40px;
  --inv-slot-size:  44px;
  --slot-gap:       2px;
}

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Animated scanline ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9998;
}
/* Moving scan beam */
body::after {
  content: '';
  position: fixed;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.12), transparent);
  animation: scanBeam 4s linear infinite;
  pointer-events: none;
  z-index: 9997;
}
@keyframes scanBeam {
  0%   { top: -4px; }
  100% { top: 100vh; }
}

/* ── Main Panel ── */
.star-chart-panel {
  width: 980px;
  height: 700px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(0,229,255,0.04),
    0 0 60px rgba(0,229,255,0.06),
    inset 0 0 80px rgba(0,0,0,0.5);
  position: relative;
}

/* Corner brackets */
.star-chart-panel::before,
.star-chart-panel::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--cyan);
  border-style: solid;
  pointer-events: none;
  z-index: 20;
}
.star-chart-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.star-chart-panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

/* ── Header ── */
.header-bar {
  height: 42px;
  min-height: 42px;
  background: linear-gradient(90deg, rgba(0,229,255,0.07) 0%, transparent 70%);
  border-bottom: 1px solid var(--border-bright);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
}
.header-bar::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 120px; height: 1px;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
}

.header-dot {
  width: 7px; height: 7px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--cyan);
  animation: dotPulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes dotPulse {
  0%,100% { opacity:1; box-shadow: 0 0 8px var(--cyan); }
  50%      { opacity:0.4; box-shadow: 0 0 3px var(--cyan); }
}

.header-title {
  color: var(--text-dim);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  flex: 1;
}
.header-title .ship-name { color: var(--cyan); font-weight: bold; letter-spacing: 0.1em; }
.header-title .sys-name  { color: var(--text-cyan); }

.header-right { display: flex; align-items: center; gap: 8px; }

.header-badge {
  font-size: 9px;
  letter-spacing: 0.12em;
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid;
}
.badge-online { color: var(--green); border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.06); }
.badge-key    { color: var(--text-dim); border-color: var(--border); font-size: 9px; }

.header-close {
  width: 22px; height: 22px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
  transition: all 0.15s;
}
.header-close:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

/* ── Loadout Section (upper ~50%) ── */
.loadout-section {
  flex: 1;
  min-height: 0;
  padding: 4px 10px 4px;
  display: flex;
  gap: 6px;
  align-items: stretch;
  overflow: hidden;
}

/* Left: Gatling switcher column */
.gatling-col {
  width: 56px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: rgba(0,229,255,0.03);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 6px 4px;
}

.gatling-btn {
  width: 40px; height: 32px;
  background: rgba(0,229,255,0.05);
  border: 1px solid var(--border-mid);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.gatling-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-glow);
  box-shadow: 0 0 8px var(--cyan-glow);
}
.gatling-btn:active { transform: scale(0.93); }

.gatling-label {
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-align: center;
  text-transform: uppercase;
}

/* ── Drum / Flip-clock counter ── */
.loadout-counter {
  width: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

/* The drum viewport — clips the flipping tile */
.drum-viewport {
  width: 52px;
  height: 36px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border-mid);
  border-radius: 2px;
  background: rgba(0,0,0,0.35);
  /* Perspective on the container so children get 3D depth */
  perspective: 120px;
  perspective-origin: center center;
}

/* Subtle top/bottom fade to sell the "cylinder" illusion */
.drum-viewport::before,
.drum-viewport::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 10px;
  z-index: 2;
  pointer-events: none;
}
.drum-viewport::before {
  top: 0;
  background: linear-gradient(to bottom, rgba(6,10,16,0.85), transparent);
}
.drum-viewport::after {
  bottom: 0;
  background: linear-gradient(to top, rgba(6,10,16,0.85), transparent);
}

/* The tile that sits inside the drum */
.drum-tile {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform-origin: center center;
  backface-visibility: hidden;
}
.drum-tile .lc-name {
  font-size: 9px;
  font-weight: bold;
  color: var(--cyan);
  letter-spacing: 0.08em;
  text-align: center;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 48px;
}
.drum-tile .lc-num {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* Flip animations — "sticker on a drum" feel */
/* Going NEXT (▼): old tile rolls away upward, new tile rolls in from below */
.drum-tile.flip-out-up {
  animation: drumOutUp 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
}
.drum-tile.flip-in-down {
  animation: drumInDown 0.22s cubic-bezier(0, 0, 0.6, 1) forwards;
}
/* Going PREV (▲): old tile rolls away downward, new tile rolls in from above */
.drum-tile.flip-out-down {
  animation: drumOutDown 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
}
.drum-tile.flip-in-up {
  animation: drumInUp 0.22s cubic-bezier(0, 0, 0.6, 1) forwards;
}

@keyframes drumOutUp {
  0%   { transform: rotateX(0deg);    opacity: 1; }
  100% { transform: rotateX(-80deg);  opacity: 0.1; }
}
@keyframes drumInDown {
  0%   { transform: rotateX(80deg);   opacity: 0.1; }
  100% { transform: rotateX(0deg);    opacity: 1; }
}
@keyframes drumOutDown {
  0%   { transform: rotateX(0deg);    opacity: 1; }
  100% { transform: rotateX(80deg);   opacity: 0.1; }
}
@keyframes drumInUp {
  0%   { transform: rotateX(-80deg);  opacity: 0.1; }
  100% { transform: rotateX(0deg);    opacity: 1; }
}

/* Horizontal center line on the drum (like a flip-clock crease) */
.drum-crease {
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: rgba(0,229,255,0.18);
  z-index: 3;
  pointer-events: none;
}

/* Right: Loadout card (rotates on switch) */
.loadout-card-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
  border-radius: 3px;
}

.loadout-card {
  width: 100%;
  height: 100%;
  background: var(--bg-track);
  border: 1px solid var(--border-mid);
  border-radius: 3px;
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  transform-origin: center center;
  transition: transform 0.05s, opacity 0.05s;
  overflow: hidden;
}

/* (Legacy rotation classes removed — replaced by sticker-slide below) */

/* Loadout card header */
.lc-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 3px;
  border-bottom: 1px solid var(--border);
}
.lc-icon { font-size: 14px; color: var(--cyan); }
.lc-title {
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.12em;
  color: var(--cyan);
  text-transform: uppercase;
}
.lc-subtitle {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  margin-left: auto;
}

/* Track rows inside loadout card */
.track-block {
  display: flex;
  align-items: stretch;
  gap: 6px;
  padding: 2px 0;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  cursor: default;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.track-block:hover {
  background: rgba(0,229,255,0.04);
  box-shadow: inset 2px 0 0 var(--cyan);
}

.track-block-label {
  width: 64px;
  flex-shrink: 0;
  padding-top: 2px;
}
.tb-name {
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 0.1em;
  color: var(--text-cyan);
  text-transform: uppercase;
}
.tb-bind {
  font-size: 8px;
  color: var(--text-dim);
  margin-top: 1px;
}

/* ── Loadout card body: SAIL column (shared) + tracks area ── */
.lc-body {
  display: flex;
  flex-direction: row;
  gap: 6px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Shared SAIL column on the left */
.sail-col-shared {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  flex-shrink: 0;
  padding: 2px 4px;
  border-radius: 2px;
  border: 1px solid rgba(52,211,153,0.15);
  transition: border-color 0.15s, background 0.15s;
}
.sail-col-shared:hover {
  background: rgba(255,255,255,0.02);
}
.sail-col-shared .track-col-header {
  border-bottom-color: rgba(52,211,153,0.30);
}

/* Tracks area (primary + secondary stacked) */
.tracks-area {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
  min-width: 0;
}

/* Track layout — 3 columns: PRISM | CORE | SAT */
.track-rows {
  display: flex;
  flex-direction: row;
  gap: 2px;
  flex: 1;
  align-items: stretch;
}

/* Each type column: SAIL | PRISM | CORE | SAT */
.track-col {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  flex: 1;
  min-width: 0;
  padding: 2px 4px;
  border-radius: 2px;
  border: 1px solid transparent;
  transition: border-color 0.15s, background 0.15s;
}
.track-col:hover {
  background: rgba(255,255,255,0.02);
}

/* Vertical separator between columns */
.track-col + .track-col {
  border-left: 1px solid var(--border);
}

/* Column header */
.track-col-header {
  display: flex;
  align-items: center;
  gap: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid;
  width: 100%;
  margin-bottom: 2px;
}
.trl-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.trl-text {
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: bold;
}
/* Type colors */
.trl-sail  .trl-dot  { background: var(--col-sail);  box-shadow: 0 0 4px var(--col-sail); }
.trl-sail  .trl-text { color: var(--col-sail); }
.trl-sail  { border-color: rgba(52,211,153,0.15) !important; }
.trl-sail  .track-col-header { border-bottom-color: rgba(52,211,153,0.30); }
.trl-prism .trl-dot  { background: var(--col-prism); box-shadow: 0 0 4px var(--col-prism); }
.trl-prism .trl-text { color: var(--col-prism); }
.trl-prism { border-color: rgba(167,139,250,0.15) !important; }
.trl-prism .track-col-header { border-bottom-color: rgba(167,139,250,0.30); }
.trl-core  .trl-dot  { background: var(--col-core);  box-shadow: 0 0 4px var(--col-core); }
.trl-core  .trl-text { color: var(--col-core); }
.trl-core  { border-color: rgba(96,165,250,0.15) !important; }
.trl-core  .track-col-header { border-bottom-color: rgba(96,165,250,0.30); }
.trl-sat   .trl-dot  { background: var(--col-sat);   box-shadow: 0 0 4px var(--col-sat); }
.trl-sat   .trl-text { color: var(--col-sat); }
.trl-sat   { border-color: rgba(251,191,36,0.15) !important; }
.trl-sat   .track-col-header { border-bottom-color: rgba(251,191,36,0.30); }

/* Slots grid inside each column */
.track-slots-grid {
  display: flex;
  flex-wrap: wrap;
  gap: var(--slot-gap);
  align-content: flex-start;
}

.track-row {
  display: flex;
  align-items: center;
  gap: 0;
}

/* Row category label strip (kept for compatibility) */
.track-row-label {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-right: 4px;
  min-width: 52px;
}

.track-slots-row {
  display: flex;
  gap: var(--slot-gap);
  align-items: center;
  flex-wrap: wrap;
}

/* ── Slot ── */
.slot {
  width: var(--slot-size);
  height: var(--slot-size);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: all 0.12s;
  flex-shrink: 0;
  overflow: hidden;
}

.slot.sail-slot {
  background: var(--col-sail-dim);
  border: 1px solid rgba(52,211,153,0.22);
}
.slot.sail-slot:hover {
  border-color: var(--col-sail);
  box-shadow: 0 0 10px var(--col-sail-glow), inset 0 0 12px rgba(52,211,153,0.1);
  transform: scale(1.05);
}

.slot.prism-slot {
  background: var(--col-prism-dim);
  border: 1px solid rgba(167,139,250,0.22);
}
.slot.prism-slot:hover {
  border-color: var(--col-prism);
  box-shadow: 0 0 10px var(--col-prism-glow), inset 0 0 12px rgba(167,139,250,0.1);
  transform: scale(1.05);
}

.slot.core-slot {
  background: var(--col-core-dim);
  border: 1px solid rgba(96,165,250,0.22);
}
.slot.core-slot:hover {
  border-color: var(--col-core);
  box-shadow: 0 0 10px var(--col-core-glow), inset 0 0 12px rgba(96,165,250,0.1);
  transform: scale(1.05);
}

.slot.sat-slot {
  background: var(--col-sat-dim);
  border: 1px solid rgba(251,191,36,0.22);
}
.slot.sat-slot:hover {
  border-color: var(--col-sat);
  box-shadow: 0 0 10px var(--col-sat-glow), inset 0 0 12px rgba(251,191,36,0.1);
  transform: scale(1.05);
}

.slot.empty::after {
  content: '+';
  font-size: 16px;
  color: rgba(255,255,255,0.10);
  font-weight: 200;
}

.slot.equipped {
  border-color: var(--cyan) !important;
  box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 8px rgba(0,229,255,0.08);
}
/* Breathing glow on equipped */
.slot.equipped::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 2px;
  box-shadow: inset 0 0 12px rgba(0,229,255,0.12);
  animation: slotBreath 2.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes slotBreath {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

.slot-icon {
  font-size: 20px;
  line-height: 1;
  user-select: none;
  position: relative;
  z-index: 1;
}

.slot-dot {
  position: absolute;
  top: 3px; right: 3px;
  width: 5px; height: 5px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 5px var(--cyan);
}

/* Slot type label with type color */
.slot-type-label {
  position: absolute;
  bottom: 2px; left: 0; right: 0;
  text-align: center;
  font-size: 7px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0.45;
}
.sail-slot  .slot-type-label { color: var(--col-sail); }
.prism-slot .slot-type-label { color: var(--col-prism); }
.core-slot  .slot-type-label { color: var(--col-core); }
.sat-slot   .slot-type-label { color: var(--col-sat); }

/* ── Divider ── */
.section-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-mid), transparent);
  margin: 0 12px;
  flex-shrink: 0;
}

/* ── Inventory Section (lower ~50%) ── */
.inventory-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* Filter + action bar */
.inv-bar {
  height: 34px;
  min-height: 34px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 4px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.filter-btn {
  padding: 3px 11px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-radius: 2px;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--cyan-dim); color: var(--text-cyan); }
.filter-btn.active {
  background: var(--cyan-glow);
  border-color: var(--cyan);
  color: var(--cyan);
}
/* Type-colored filter buttons */
.filter-sail  { border-color: rgba(52,211,153,0.2);  color: rgba(52,211,153,0.6); }
.filter-prism { border-color: rgba(167,139,250,0.2); color: rgba(167,139,250,0.6); }
.filter-core  { border-color: rgba(96,165,250,0.2);  color: rgba(96,165,250,0.6); }
.filter-sat   { border-color: rgba(251,191,36,0.2);  color: rgba(251,191,36,0.6); }
.filter-sail.active  { background: rgba(52,211,153,0.1);  border-color: var(--col-sail);  color: var(--col-sail); }

.inv-bar-sep {

.action-btn {

/* Inventory grid */
.inventory-area {

  overflow-y: auto;
  padding: 8px 12px 10px;

}

/* ── Inventory Slot ── */
.inv-slot {
  width: var(--inv-slot-size);
  height: var(--inv-slot-size);
  background: var(--bg-slot);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  position: relative;

  flex-shrink: 0;
  overflow: hidden;
}
.inv-slot:hover {

}
.inv-slot.selected {
  border-color: var(--cyan);

  background: rgba(0,229,255,0.07);
}
.inv-slot.is-equipped {

}

.inv-icon { font-size: 20px; line-height: 1; }
.inv-name {
  font-size: 7px;
  color: var(--text-dim);
  text-align: center;
  margin-top: 3px;
  padding: 0 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.inv-type-dot {
  position: absolute;
  top: 3px; left: 3px;
  width: 4px; height: 4px;
  border-radius: 50%;
}
.dot-core  { background: #60a5fa; }
.dot-prism { background: #a78bfa; }
.dot-sail  { background: #34d399; }
.dot-sat   { background: #fbbf24; }

.inv-eq-badge {
  position: absolute;
  bottom: 2px; right: 3px;
  font-size: 7px;
  color: var(--green);
}

/* ── Status bar ── */
.status-bar {
  height: 22px;
  min-height: 22px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 14px;
  flex-shrink: 0;
}
.st-item {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}
.st-item b { color: var(--text-cyan); font-weight: normal; }
.st-hint { margin-left: auto; font-size: 9px; color: rgba(74,96,128,0.6); letter-spacing: 0.06em; }

/* ── Tooltip ── */
.tooltip {
  position: fixed;
  width: 230px;
  background: #0a1525;
  border: 1px solid var(--border-bright);
  border-radius: 3px;
  padding: 10px 12px;
  pointer-events: none;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.08s linear;
  box-shadow: 0 6px 30px rgba(0,0,0,0.7), 0 0 16px var(--cyan-glow);
}
.tooltip.visible { opacity: 1; }

.tt-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.tt-icon   { font-size: 26px; }
.tt-name   { font-size: 13px; font-weight: bold; color: var(--text-primary); letter-spacing: 0.04em; }
.tt-type   { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px; }
.tt-type.core  { color: #60a5fa; }
.tt-type.prism { color: #a78bfa; }
.tt-type.sail  { color: #34d399; }
.tt-type.sat   { color: #fbbf24; }

.tt-div { height: 1px; background: var(--border); margin: 6px 0; }

.tt-stat {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; margin-bottom: 3px;
}
.tt-arrow { width: 12px; text-align: center; }
.arr-up   { color: var(--green); }
.arr-down { color: var(--red); }
.tt-label { color: var(--text-dim); flex: 1; }
.tt-val   { color: var(--text-primary); font-weight: bold; }

.tt-desc {
  font-size: 10px; color: var(--text-dim);
  line-height: 1.5; font-style: italic; margin-top: 4px;
}
.tt-eq-tag {

  font-size: 9px; letter-spacing: 0.1em;
  color: var(--green);

}
.tt-hint {
  font-size: 9px; color: var(--text-dim);
  margin-top: 4px; opacity: 0.65;
}

/* ── Notification ── */
.notif {
  position: absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,229,255,0.08);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-size: 10px; letter-spacing: 0.1em;
  padding: 5px 16px; border-radius: 2px;
  pointer-events: none;
  opacity: 0; transition: opacity 0.18s;
  white-space: nowrap; z-index: 200;
}
.notif.show { opacity: 1; }

/* ── Gatling shake ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-2px); }
  40%     { transform: translateX(2px); }
  60%     { transform: translateX(-1px); }
  80%     { transform: translateX(1px); }
}
.shake { animation: shake 0.25s ease; }

/* ── Sticker-slide animation ──
   Loadout card = sticker on a rolling pin viewed from above.
   As a sticker slides away it also recedes into depth (scale ↓ + fade),
   and a new sticker approaches from depth (scale ↑ + fade in).
   "Next" (forward): current slides UP & shrinks, new slides in from BELOW.
   "Prev" (backward): current slides DOWN & shrinks, new slides in from ABOVE.
*/

/* Slide current card OUT upward (next loadout) */
@keyframes slideOutUp {
  0%   { transform: translateY(0)    scale(1);    opacity: 1; }
  100% { transform: translateY(-35%) scale(0.88); opacity: 0; }
}
/* Slide new card IN from below (next loadout) */
@keyframes slideInFromBelow {
  0%   { transform: translateY(35%)  scale(0.88); opacity: 0; }
  100% { transform: translateY(0)    scale(1);    opacity: 1; }
}
/* Slide current card OUT downward (prev loadout) */
@keyframes slideOutDown {
  0%   { transform: translateY(0)    scale(1);    opacity: 1; }
  100% { transform: translateY(35%)  scale(0.88); opacity: 0; }
}
/* Slide new card IN from above (prev loadout) */
@keyframes slideInFromAbove {
  0%   { transform: translateY(-35%) scale(0.88); opacity: 0; }
  100% { transform: translateY(0)    scale(1);    opacity: 1; }
}

.loadout-card.roll-out-forward {
  animation: slideOutUp 0.26s cubic-bezier(0.4, 0, 1, 1) forwards;
}
.loadout-card.roll-in-forward {
  animation: slideInFromBelow 0.26s cubic-bezier(0, 0, 0.6, 1) forwards;
}
.loadout-card.roll-out-backward {
  animation: slideOutDown 0.26s cubic-bezier(0.4, 0, 1, 1) forwards;
}
/* ── Drag Ghost ── */
#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 52px;
  height: 52px;
  border-radius: 3px;
  background: rgba(11,17,32,0.92);
  border: 2px solid var(--cyan);
  box-shadow: 0 0 16px rgba(0,229,255,0.35), 0 4px 20px rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: grabbing;
  transition: border-color 0.08s, box-shadow 0.08s;
  user-select: none;
}
#drag-ghost.ghost-valid {
  border-color: var(--green);
  box-shadow: 0 0 16px rgba(34,197,94,0.45), 0 4px 20px rgba(0,0,0,0.7);
}
#drag-ghost.ghost-invalid {
  border-color: var(--red);
  box-shadow: 0 0 16px rgba(239,68,68,0.45), 0 4px 20px rgba(0,0,0,0.7);
}
#drag-ghost .ghost-icon { font-size: 22px; line-height: 1; }
#drag-ghost .ghost-name {
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  margin-top: 2px;
  text-align: center;
  max-width: 48px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Drop target highlights ── */

/* All matching slots glow softly while dragging */
.slot.drop-candidate {
  border-color: rgba(34,197,94,0.8) !important;
  animation: candidatePulse 1.1s ease-in-out infinite !important;
}
@keyframes candidatePulse {
  0%,100% {
    background: rgba(34,197,94,0.06);
    box-shadow: 0 0 10px rgba(34,197,94,0.3), inset 0 0 10px rgba(34,197,94,0.08);
  }
  50% {
    background: rgba(34,197,94,0.22);
    box-shadow: 0 0 22px rgba(34,197,94,0.65), inset 0 0 20px rgba(34,197,94,0.25);
  }
}

/* Hovered slot upgrades to full valid highlight */
.slot.drop-valid {
  border-color: var(--green) !important;
  box-shadow: 0 0 18px rgba(34,197,94,0.7), inset 0 0 12px rgba(34,197,94,0.2) !important;
  transform: scale(1.1) !important;
  animation: none !important;
}
.slot.drop-invalid {
  border-color: var(--red) !important;
  box-shadow: 0 0 10px rgba(239,68,68,0.4) !important;
  animation: none !important;
}

/* Inventory area drop target */
.inventory-area.drop-target-inv {
  box-shadow: inset 0 0 0 2px rgba(34,197,94,0.4);
  background: rgba(34,197,94,0.04);
}

/* Dragging source item in inventory — ghost placeholder */
.inv-slot.dragging-source {
  opacity: 0.35;
  cursor: grabbing;
}

/* Slot being dragged from — show as empty */
.slot.dragging-source {
  opacity: 0.35;
}

/* ── Fly-back animation clone ── */
.fly-clone {
  position: fixed;
  pointer-events: none;
  z-index: 9990;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: transform 350ms ease-in, opacity 350ms ease-in;
  will-change: transform, opacity;
}

/* Landing bounce on inventory item */
@keyframes landBounce {
  0%   { transform: scale(1.2); }
  60%  { transform: scale(0.95); }
  100% { transform: scale(1.0); }
}
.inv-slot.land-bounce {
  animation: landBounce 150ms cubic-bezier(0.2, 0, 0.4, 1) forwards;
}

/* ── Snap-in animation when item is placed ── */
@keyframes snapIn {
  0%   { transform: scale(1.18); }
  60%  { transform: scale(0.96); }
  100% { transform: scale(1.0); }
}
.slot.snap-in { animation: snapIn 0.18s cubic-bezier(0.2, 0, 0.4, 1) forwards; }

<script>
// ═══════════════════════════════════════════════════════
// DATA — Grid Inventory & Shaped Items System
// ═══════════════════════════════════════════════════════

// shape: array of [col, row] offsets from anchor [0,0] (top-left)
// Supported shapes:
//   1×1: [[0,0]]
//   1×2 (horizontal): [[0,0],[1,0]]
//   2×1 (vertical):   [[0,0],[0,1]]
//   L-shape (3 cells): [[0,0],[0,1],[1,1]]
//   2×2 (full):        [[0,0],[1,0],[0,1],[1,1]]

const ITEMS = [
  // CORES
  { id:'c1', type:'core',  icon:'◎', name:'Matter Core',   short:'Matter',   shape:[[0,0]],               desc:'"Standard-issue matter projector. Reliable, no frills."',                    stats:[{l:'Damage',d:'n',v:'+0%'},{l:'Fire Rate',d:'n',v:'+0%'},{l:'Piercing',d:'n',v:'0'}] },
  { id:'c2', type:'core',  icon:'◎', name:'Echo Core',     short:'Echo',     shape:[[0,0],[1,0]],          desc:'"Resonance-based wave emitter. Hits multiple targets."',                      stats:[{l:'Damage',d:'-',v:'-15%'},{l:'AoE',d:'+',v:'+2'},{l:'Range',d:'+',v:'+30%'}] },
  { id:'c3', type:'core',  icon:'◎', name:'Light Core',    short:'Laser',    shape:[[0,0],[0,1]],          desc:'"Focused photon beam. Continuous damage output."',                            stats:[{l:'DPS',d:'+',v:'+40%'},{l:'Fire Rate',d:'+',v:'∞'},{l:'Ammo',d:'-',v:'Heat'}] },

  { id:'c5', type:'core',  icon:'◎', name:'Void Core',     short:'Void',     shape:[[0,0],[1,0],[0,1],[1,1]], desc:'"Fires a slow-moving singularity that pulls enemies inward."',             stats:[{l:'Pull Radius',d:'+',v:'3m'},{l:'Damage',d:'+',v:'+20%'},{l:'Speed',d:'-',v:'-40%'}] },
  // PRISMS
  { id:'p1', type:'prism', icon:'◇', name:'Fractal Prism', short:'Twin',     shape:[[0,0]],               desc:'"Splits the beam into twin parallel streams."',                               stats:[{l:'Projectiles',d:'+',v:'×2'},{l:'Damage',d:'-',v:'-20%'},{l:'Spread',d:'n',v:'8°'}] },
  { id:'p2', type:'prism', icon:'◇', name:'Accel Prism',   short:'Accel',    shape:[[0,0],[1,0]],          desc:'"Accelerates projectile velocity over distance."',                            stats:[{l:'Speed',d:'+',v:'+50%'},{l:'Damage',d:'+',v:'+10%'},{l:'Range',d:'+',v:'+25%'}] },
  { id:'p3', type:'prism', icon:'◇', name:'Frost Prism',   short:'Frost',    shape:[[0,0],[0,1]],          desc:'"Infuses projectiles with cryo energy. Slows on hit."',                      stats:[{l:'Slow',d:'+',v:'-30% spd'},{l:'Duration',d:'+',v:'1.5s'},{l:'Damage',d:'-',v:'-5%'}] },
  { id:'p4', type:'prism', icon:'◇', name:'Burst Prism',   short:'Burst',    shape:[[0,0],[0,1],[1,1]],    desc:'"Causes projectiles to explode on impact."',                                  stats:[{l:'AoE',d:'+',v:'1.5m'},{l:'Damage',d:'+',v:'+30%'},{l:'Ammo',d:'-',v:'-1/shot'}] },
  { id:'p5', type:'prism', icon:'◇', name:'Chain Prism',   short:'Chain',    shape:[[0,0],[1,0],[0,1],[1,1]], desc:'"Projectiles bounce between nearby enemies."',                             stats:[{l:'Bounces',d:'+',v:'+3'},{l:'Damage',d:'-',v:'-10%/bounce'}] },
  // SAILS
  { id:'s1', type:'sail',  icon:'⛵', name:'Speed Sail',    short:'Speed',    shape:[[0,0]],               desc:'"Converts velocity into bonus damage output."',                               stats:[{l:'Bonus DMG',d:'+',v:'up to +80%'},{l:'Threshold',d:'n',v:'8 m/s'}] },
  { id:'s2', type:'sail',  icon:'⛵', name:'Drift Sail',    short:'Drift',    shape:[[0,0],[1,0]],          desc:'"Reduces turning drag, enabling tighter maneuvers."',                        stats:[{l:'Turn Speed',d:'+',v:'+25%'},{l:'Drift',d:'+',v:'+40%'}] },
  // SATS
  { id:'sat1', type:'sat', icon:'🛸', name:'Orbit Sat A',   short:'Orbit-A',  shape:[[0,0]],               desc:'"Orbiting satellite that fires in sync with primary weapon."',               stats:[{l:'Sync DMG',d:'+',v:'+15%'},{l:'Orbit Rad',d:'n',v:'2.5m'}] },
  { id:'sat2', type:'sat', icon:'🛸', name:'Shield Sat',    short:'Shield',   shape:[[0,0],[0,1]],          desc:'"Generates a rotating energy shield that absorbs one hit."',                 stats:[{l:'Absorb',d:'+',v:'1 hit'},{l:'Cooldown',d:'n',v:'8s'}] },
];

// ── Shape helpers ──
// Returns { cols, rows } bounding box of a shape
function getShapeBounds(shape) {
  let maxC = 0, maxR = 0;
  for (const [c, r] of shape) { if (c > maxC) maxC = c; if (r > maxR) maxR = r; }
  return { cols: maxC + 1, rows: maxR + 1 };
}

// Returns true if shape placed at (anchorCol, anchorRow) exceeds 2×2 grid
function shapeExceedsGrid(shape, anchorCol, anchorRow) {
  for (const [dc, dr] of shape) {
    if (anchorCol + dc > 1 || anchorRow + dr > 1) return true;
    if (anchorCol + dc < 0 || anchorRow + dr < 0) return true;
  }
  return false;
}

// Make a fresh 2×2 grid (null = empty)
function makeGrid() {
  return [[null, null], [null, null]];
}

// Track data structure: { type, grid: [[null,null],[null,null]] }
// grid[row][col] = itemId | null
// Each loadout: { name, sail (shared), primary: { prism, core, sat }, secondary: { prism, core, sat } }
// Each type key holds: { grid: 2×2 array }
// SAIL is global (not primary/secondary specific) — stored at lo.sail

function makeTrackType() {
  return { grid: makeGrid() };
}

function makeLoadout(name) {
  return {
    name,
    sail:      makeTrackType(),   // shared, not tied to primary/secondary
    primary:   { prism: makeTrackType(), core: makeTrackType(), sat: makeTrackType() },
    secondary: { prism: makeTrackType(), core: makeTrackType(), sat: makeTrackType() },
  };
}

// Pre-populate helper: place item at anchor in a track type grid
function placeItem(trackTypeObj, itemId, anchorCol, anchorRow) {
  const item = ITEMS.find(i => i.id === itemId);
  if (!item) return;
  for (const [dc, dr] of item.shape) {
    trackTypeObj.grid[anchorRow + dr][anchorCol + dc] = itemId;
  }
}

// Build initial loadouts
const lo1 = makeLoadout('LOADOUT 1');
placeItem(lo1.sail,           's1',   0, 0);  // shared sail
placeItem(lo1.primary.prism,  'p2',   0, 0);
placeItem(lo1.primary.core,   'c2',   0, 0);  // 1×2 horizontal → [0,0],[1,0]
placeItem(lo1.primary.sat,    'sat1', 0, 0);
placeItem(lo1.secondary.prism,'p3',   0, 0);  // 2×1 vertical → [0,0],[0,1]
placeItem(lo1.secondary.core, 'c1',   0, 0);

const lo2 = makeLoadout('LOADOUT 2');
placeItem(lo2.sail,           's2',   0, 0);  // shared sail, 1×2 horizontal
placeItem(lo2.primary.prism,  'p1',   0, 0);
placeItem(lo2.primary.core,   'c3',   0, 0);  // 2×1 vertical

const lo3 = makeLoadout('LOADOUT 3');
placeItem(lo3.sail,           's1',   0, 0);  // shared sail
placeItem(lo3.primary.prism,  'p4',   0, 0);  // L-shape
placeItem(lo3.primary.core,   'c4',   0, 0);  // L-shape
placeItem(lo3.primary.sat,    'sat2', 0, 0);  // 2×1 vertical
placeItem(lo3.secondary.core, 'c5',   0, 0);  // 2×2 full
placeItem(lo3.secondary.sat,  'sat1', 0, 0);

const state = {
  loadouts: [lo1, lo2, lo3],
  currentLoadout: 0,
  activeFilter: 'all',
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════

const getItem = id => ITEMS.find(i => i.id === id);
function currentLoadout() { return state.loadouts[state.currentLoadout]; }

const TYPE_KEYS = ['prism', 'core', 'sat'];  // sail is shared, handled separately
const TRACK_KEYS = ['primary', 'secondary'];

// Helper: extract equipped entries from a single track-type grid
function extractEntries(tt, track, typeKey) {
  const result = [];
  if (!tt) return result;
  const seen = new Set();
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 2; c++) {
      const id = tt.grid[r][c];
      if (id && !seen.has(id)) {
        seen.add(id);
        const item = getItem(id);
        if (!item) continue;
        let minR = 99, minC = 99;
        for (let rr = 0; rr < 2; rr++) for (let cc = 0; cc < 2; cc++) {
          if (tt.grid[rr][cc] === id) { if (rr < minR || (rr === minR && cc < minC)) { minR = rr; minC = cc; } }
        }
        result.push({ itemId: id, track, typeKey, anchorCol: minC, anchorRow: minR });
      }
    }
  }
  return result;
}

// Returns all { itemId, track, typeKey, anchorCol, anchorRow } for equipped items in a loadout
function allEquippedEntries(lo) {
  const result = [];
  // Shared sail (track = 'shared')
  result.push(...extractEntries(lo.sail, 'shared', 'sail'));
  // Primary/secondary prism/core/sat
  for (const track of TRACK_KEYS) {
    for (const typeKey of TYPE_KEYS) {
      result.push(...extractEntries(lo[track][typeKey], track, typeKey));
    }
  }
  return result;
}

function isEquippedInCurrentLoadout(itemId) {
  return allEquippedEntries(currentLoadout()).some(e => e.itemId === itemId);
}

function getEquippedLocation(itemId) {
  const entry = allEquippedEntries(currentLoadout()).find(e => e.itemId === itemId);
  if (!entry) return null;
  const trackLabel = entry.track === 'shared' ? 'SHARED' : entry.track.toUpperCase();
  return `${trackLabel} · ${entry.typeKey.toUpperCase()} [${entry.anchorCol},${entry.anchorRow}]`;
}

function countEquipped() {
  return allEquippedEntries(currentLoadout()).length;
}

// Clear all cells of an item from a track-type grid
function clearItemFromGrid(tt, itemId) {
  for (let r = 0; r < 2; r++) for (let c = 0; c < 2; c++) {
    if (tt.grid[r][c] === itemId) tt.grid[r][c] = null;
  }
}

// Write item shape into grid at anchor
function writeItemToGrid(tt, item, anchorCol, anchorRow) {
  for (const [dc, dr] of item.shape) {
    tt.grid[anchorRow + dr][anchorCol + dc] = item.id;
  }
}

// Check if placing item at anchor in tt is valid (no overlap except self, no OOB)
function canPlace(tt, item, anchorCol, anchorRow, selfId) {
  if (shapeExceedsGrid(item.shape, anchorCol, anchorRow)) return false;
  for (const [dc, dr] of item.shape) {
    const existing = tt.grid[anchorRow + dr][anchorCol + dc];
    if (existing && existing !== selfId) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

// Cell size and gap (must match CSS vars)
const CELL_SIZE = 40;  // px — matches --slot-size
const CELL_GAP  = 3;   // px

// ── Task 2: Render a single 2×2 track-type grid ──
function renderTrackTypeGrid(trackName, typeKey, tt) {
  // For shared sail, container id is 'shared-slots-sail'
  const containerId = `${trackName}-slots-${typeKey}`;
  const container = document.getElementById(containerId);
  if (!container) return;

  // Set up as 2×2 CSS grid
  container.innerHTML = '';
  container.style.display = 'grid';
  container.style.gridTemplateColumns = 'repeat(2, var(--slot-size))';
  container.style.gridTemplateRows    = 'repeat(2, var(--slot-size))';
  container.style.gap = CELL_GAP + 'px';
  container.style.position = 'relative';

  // Render 4 cells (row-major)
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 2; c++) {
      const cell = document.createElement('div');
      cell.className = `track-cell ${typeKey}-cell`;
      cell.dataset.track   = trackName;
      cell.dataset.typeKey = typeKey;
      cell.dataset.col     = c;
      cell.dataset.row     = r;

      const occupant = tt.grid[r][c];
      if (occupant) {
        // Occupied — cell is hidden under overlay; show dim background
        cell.classList.add('cell-occupied');
      } else {
        // Empty — show + placeholder
        cell.classList.add('cell-empty');
        cell.innerHTML = '<span class="cell-plus">+</span>';
      }
      container.appendChild(cell);
    }
  }

  // ── Task 3: Render item overlays on top of cells ──
  renderTrackTypeOverlays(trackName, typeKey, tt, container);
}

// ── Task 3: Render item overlays ──
function renderTrackTypeOverlays(trackName, typeKey, tt, container) {
  // Remove existing overlays
  container.querySelectorAll('.item-overlay').forEach(el => el.remove());

  // Find unique items in this grid
  const seen = new Set();
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 2; c++) {
      const id = tt.grid[r][c];
      if (id && !seen.has(id)) {
        seen.add(id);
        // Find anchor (min row, then min col)
        let minR = 99, minC = 99;
        for (let rr = 0; rr < 2; rr++) for (let cc = 0; cc < 2; cc++) {
          if (tt.grid[rr][cc] === id) {
            if (rr < minR || (rr === minR && cc < minC)) { minR = rr; minC = cc; }
          }
        }
        renderItemOverlay(trackName, typeKey, id, minC, minR, container);
      }
    }
  }
}

function renderItemOverlay(trackName, typeKey, itemId, anchorCol, anchorRow, container) {
  const item = getItem(itemId);
  if (!item) return;

  const bounds = getShapeBounds(item.shape);
  const w = bounds.cols * CELL_SIZE + (bounds.cols - 1) * CELL_GAP;
  const h = bounds.rows * CELL_SIZE + (bounds.rows - 1) * CELL_GAP;

  // Position: top-left of anchor cell
  const left = anchorCol * (CELL_SIZE + CELL_GAP);
  const top  = anchorRow * (CELL_SIZE + CELL_GAP);

  const overlay = document.createElement('div');
  overlay.className = `item-overlay item-overlay-${typeKey}`;
  overlay.dataset.itemId    = itemId;
  overlay.dataset.track     = trackName;
  overlay.dataset.typeKey   = typeKey;
  overlay.dataset.anchorCol = anchorCol;
  overlay.dataset.anchorRow = anchorRow;
  overlay.style.cssText = `
    position: absolute;
    left: ${left}px; top: ${top}px;
    width: ${w}px; height: ${h}px;
    z-index: 10;
    border-radius: 3px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: grab;
    user-select: none;
    pointer-events: all;
    overflow: hidden;
  `;

  // Shape cells inside overlay (visual only)
  const shapeGrid = document.createElement('div');
  shapeGrid.style.cssText = `
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(${bounds.cols}, 1fr);
    grid-template-rows: repeat(${bounds.rows}, 1fr);
    gap: ${CELL_GAP}px;
    padding: ${CELL_GAP}px;
  `;
  // Fill shape cells
  const shapeSet = new Set(item.shape.map(([c,r]) => `${c},${r}`));
  for (let r = 0; r < bounds.rows; r++) {
    for (let c = 0; c < bounds.cols; c++) {
      const sc = document.createElement('div');
      if (shapeSet.has(`${c},${r}`)) {
        sc.className = `overlay-shape-cell overlay-shape-cell-${typeKey}`;
      } else {
        sc.style.background = 'transparent';
      }
      shapeGrid.appendChild(sc);
    }
  }
  overlay.appendChild(shapeGrid);

  // Icon
  const iconEl = document.createElement('div');
  iconEl.className = 'overlay-icon';
  iconEl.textContent = item.icon;
  overlay.appendChild(iconEl);

  // Name (only if tall enough)
  if (h >= 60) {
    const nameEl = document.createElement('div');
    nameEl.className = 'overlay-name';
    nameEl.textContent = item.short;
    overlay.appendChild(nameEl);
  }

  // Tooltip on hover
  overlay.addEventListener('mouseenter', e => {
    if (!dragState.isDragging) showTooltip(e, item, true);
  });
  overlay.addEventListener('mousemove', e => {
    if (!dragState.isDragging) moveTooltip(e);
  });
  overlay.addEventListener('mouseleave', () => {
    if (!dragState.isDragging) hideTooltip();
  });

  // Mousedown → start unequip drag (Task 8)
  overlay.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const rect = overlay.getBoundingClientRect();
    dragState.startX      = e.clientX;
    dragState.startY      = e.clientY;
    // Keep grab point exactly where mouse clicked inside the overlay
    dragState.grabOffsetX = e.clientX - rect.left;
    dragState.grabOffsetY = e.clientY - rect.top;
    dragState.pendingEl = overlay;
    dragState.pendingItem = item;
    dragState.pendingSource = {
      sourceType: 'overlay',
      item,
      sourceSlotId: { track: trackName, typeKey, anchorCol, anchorRow },
      sourceLoadoutIdx: state.currentLoadout,
    };
  });

  container.appendChild(overlay);

  return overlay;
}

function renderAllTracks() {
  const lo = currentLoadout();
  // Render shared sail
  renderTrackTypeGrid('shared', 'sail', lo.sail);
  // Render primary/secondary prism/core/sat
  for (const track of TRACK_KEYS) {
    for (const typeKey of TYPE_KEYS) {
      renderTrackTypeGrid(track, typeKey, lo[track][typeKey]);
    }
  }
  updateStatusBar();
}

// ── Task 4: Render inventory as 16-col CSS Grid ──
function renderInventory() {
  const grid = document.getElementById('invGrid');
  grid.innerHTML = '';

  // 16-col CSS grid, auto rows
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = 'repeat(16, var(--inv-slot-size))';
  grid.style.gridAutoRows = 'var(--inv-slot-size)';
  grid.style.gap = '3px';

  const filter = state.activeFilter;
  const allVisible = ITEMS.filter(i => filter === 'all' || i.type === filter);
  const visible = allVisible.filter(i => !isEquippedInCurrentLoadout(i.id));

  if (visible.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'grid-column: span 16; padding: 18px 0; text-align:center; font-size:10px; letter-spacing:0.14em; color:var(--text-dim); opacity:0.55;';
    empty.textContent = allVisible.length === 0 ? 'NO ITEMS' : 'ALL ITEMS EQUIPPED';
    grid.appendChild(empty);
    document.getElementById('st-inv').textContent = 0;
    return;
  }

  visible.forEach(item => {
    const bounds = getShapeBounds(item.shape);
    const el = document.createElement('div');
    el.className = `inv-slot inv-slot-${item.type}`;
    el.dataset.itemId = item.id;
    el.style.gridColumn = `span ${bounds.cols}`;
    el.style.gridRow    = `span ${bounds.rows}`;
    el.style.cursor = 'grab';

    // Shape preview inside inventory slot
    const shapeSet = new Set(item.shape.map(([c,r]) => `${c},${r}`));
    let shapeCells = '';
    for (let r = 0; r < bounds.rows; r++) {
      for (let c = 0; c < bounds.cols; c++) {
        const active = shapeSet.has(`${c},${r}`);
        shapeCells += `<div class="inv-shape-cell ${active ? 'inv-shape-active-' + item.type : 'inv-shape-empty'}"></div>`;
      }
    }

    el.innerHTML = `
      <div class="inv-type-dot dot-${item.type}"></div>
      <div class="inv-shape-grid" style="grid-template-columns:repeat(${bounds.cols},1fr);grid-template-rows:repeat(${bounds.rows},1fr)">${shapeCells}</div>
      <div class="inv-icon">${item.icon}</div>
      <div class="inv-name">${item.short}</div>
    `;

    bindInvItemDrag(el, item);
    el.addEventListener('mouseenter', e => { if (!dragState.isDragging) showTooltip(e, item, false); });
    el.addEventListener('mousemove',  e => { if (!dragState.isDragging) moveTooltip(e); });
    el.addEventListener('mouseleave', () => { if (!dragState.isDragging) hideTooltip(); });
    grid.appendChild(el);
  });

  document.getElementById('st-inv').textContent = visible.length;
}

function updateStatusBar() {
  document.getElementById('st-eq').textContent = countEquipped();
}

function updateLoadoutHeader() {
  const lo = currentLoadout();
  const idx = state.currentLoadout;
  const total = state.loadouts.length;
  document.getElementById('lc-name').textContent      = lo.name;
  document.getElementById('lc-num').textContent       = `${idx+1} / ${total}`;
  document.getElementById('lc-card-title').textContent = `${lo.name} CONFIGURATION`;
  document.getElementById('lc-card-num').textContent   = idx + 1;
}

// ═══════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════

// ── Loadout switching — sticker-slide animation ──

// ═══════════════════════════════════════════════════════
// FLY-BACK ANIMATION SYSTEM (Task 5)
// ═══════════════════════════════════════════════════════

// Track all active flight animations so we can skip them on new drag
const activeFlightAnimations = [];

// Skip all in-progress fly animations immediately
function skipAllFlightAnimations() {
  while (activeFlightAnimations.length > 0) {
    const anim = activeFlightAnimations.pop();
    if (anim.clone && anim.clone.parentNode) anim.clone.parentNode.removeChild(anim.clone);
    if (anim.invEl) anim.invEl.style.opacity = '';
    clearTimeout(anim.timer);
  }
}

// Fly a single evicted item from its track position to its inventory slot
function flyItemToInventory(itemId, sourceRect) {
  if (!sourceRect) return;

  const item = getItem(itemId);
  if (!item) return;

  // Find the inventory slot DOM element for this item (rendered after renderInventory)
  const invEl = document.querySelector(`.inv-slot[data-item-id="${itemId}"]`);
  if (!invEl) return;

  const targetRect = invEl.getBoundingClientRect();

  // Hide the real inventory item during flight
  invEl.style.opacity = '0';

  // Create fly clone
  const clone = document.createElement('div');
  clone.className = 'fly-clone';
  clone.style.left   = sourceRect.left + 'px';
  clone.style.top    = sourceRect.top  + 'px';
  clone.style.width  = sourceRect.width  + 'px';
  clone.style.height = sourceRect.height + 'px';
  clone.style.background = `var(--col-${item.type}-dim)`;
  clone.style.border = `2px solid var(--col-${item.type})`;
  clone.style.boxShadow = `0 0 12px var(--col-${item.type}-glow)`;
  clone.innerHTML = `<span style="font-size:18px;line-height:1">${item.icon}</span>`;
  document.body.appendChild(clone);

  // Calculate transform to move from source to target
  const dx = targetRect.left - sourceRect.left + (targetRect.width  - sourceRect.width)  / 2;
  const dy = targetRect.top  - sourceRect.top  + (targetRect.height - sourceRect.height) / 2;
  const scaleX = targetRect.width  / sourceRect.width;
  const scaleY = targetRect.height / sourceRect.height;
  const scale  = Math.min(scaleX, scaleY);

  // Register animation entry
  const animEntry = { clone, invEl, timer: null };
  activeFlightAnimations.push(animEntry);

  // Trigger animation on next frame (allow initial paint)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      clone.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
      clone.style.opacity   = '0';
    });
  });

  // After animation ends: remove clone, show real item, play landing bounce
  const timer = setTimeout(() => {
    if (clone.parentNode) clone.parentNode.removeChild(clone);
    invEl.style.opacity = '';

    // Landing bounce
    invEl.classList.remove('land-bounce');
    void invEl.offsetWidth; // reflow
    invEl.classList.add('land-bounce');
    setTimeout(() => invEl.classList.remove('land-bounce'), 160);

    // Remove from active list
    const idx = activeFlightAnimations.indexOf(animEntry);
    if (idx !== -1) activeFlightAnimations.splice(idx, 1);
  }, 370); // 350ms transition + 20ms buffer

  animEntry.timer = timer;
}

// ═══════════════════════════════════════════════════════
// DRAG & DROP SYSTEM (Tasks 5–9)
// ═══════════════════════════════════════════════════════

// ── Drag State ──
const dragState = {
  isDragging:    false,
  sourceType:    null,   // 'inventory' | 'overlay'
  item:          null,   // item object
  sourceSlotId:  null,   // { track, typeKey, anchorCol, anchorRow } if from overlay
  sourceLoadout: null,
  startX:        0,
  startY:        0,
  grabOffsetX:   0,      // mouse X relative to dragged element's left edge
  grabOffsetY:   0,      // mouse Y relative to dragged element's top edge
  pendingEl:     null,
  pendingItem:   null,
  pendingSource: null,
  // Preview state
  previewValid:  false,
  previewTarget: null,   // { track, typeKey, anchorCol, anchorRow }
};

const ghost = document.getElementById('drag-ghost');
const ghostIcon = document.getElementById('ghost-icon');
const ghostName = document.getElementById('ghost-name');

// ── Task 5: Shape-aware Ghost ──
function showGhost(item) {
  const bounds = getShapeBounds(item.shape);
  const w = bounds.cols * CELL_SIZE + (bounds.cols - 1) * CELL_GAP;
  const h = bounds.rows * CELL_SIZE + (bounds.rows - 1) * CELL_GAP;

  ghost.style.width  = w + 'px';
  ghost.style.height = h + 'px';

  // Build shape grid inside ghost
  const shapeSet = new Set(item.shape.map(([c,r]) => `${c},${r}`));
  let cells = '';
  for (let r = 0; r < bounds.rows; r++) {
    for (let c = 0; c < bounds.cols; c++) {
      const active = shapeSet.has(`${c},${r}`);
      cells += `<div class="ghost-shape-cell ${active ? 'ghost-shape-active' : 'ghost-shape-empty'}"></div>`;
    }
  }

  ghost.innerHTML = `
    <div class="ghost-shape-grid" style="grid-template-columns:repeat(${bounds.cols},1fr);grid-template-rows:repeat(${bounds.rows},1fr)">${cells}</div>
    <div class="ghost-icon-wrap"><span class="ghost-icon">${item.icon}</span><span class="ghost-name">${item.short}</span></div>
  `;
  ghost.style.display = 'flex';
  ghost.className = '';
}

function hideGhost() {
  ghost.style.display = 'none';
  ghost.className = '';
}

function moveGhost(x, y) {
  ghost.style.left = (x - dragState.grabOffsetX) + 'px';
  ghost.style.top  = (y - dragState.grabOffsetY) + 'px';
}

// ── Candidate highlight: glow all matching type columns while dragging ──
function highlightCandidateColumns(itemType) {
  if (itemType === 'sail') {
    // Sail has a single shared column
    document.querySelectorAll('.sail-col-shared').forEach(col => {
      col.classList.add('drop-candidate-col');
    });
  } else {
    document.querySelectorAll(`.track-col.trl-${itemType}`).forEach(col => {
      col.classList.add('drop-candidate-col');
    });
  }
}

function clearCandidateColumns() {
  document.querySelectorAll('.drop-candidate-col').forEach(el => {
    el.classList.remove('drop-candidate-col');
  });
}

// ── Task 6: Preview highlight on cells ──
function clearPreviewHighlights() {
  document.querySelectorAll('.track-cell.preview-valid, .track-cell.preview-replace, .track-cell.preview-invalid').forEach(el => {
    el.classList.remove('preview-valid', 'preview-replace', 'preview-invalid');
  });
  dragState.previewValid  = false;
  dragState.previewTarget = null;
}

function getTrackTypeData(lo, trackName, typeKey) {
  if (trackName === 'shared') return lo.sail;
  return lo[trackName]?.[typeKey];
}

function applyPreview(trackName, typeKey, anchorCol, anchorRow) {
  clearPreviewHighlights();
  const lo = currentLoadout();
  const tt = getTrackTypeData(lo, trackName, typeKey);
  const item = dragState.item;
  const selfId = dragState.sourceType === 'overlay' ? item.id : null;

  // Check out-of-bounds first (only hard rejection)
  if (shapeExceedsGrid(item.shape, anchorCol, anchorRow)) {
    // Mark all in-bounds cells as invalid
    for (const [dc, dr] of item.shape) {
      const c = anchorCol + dc;
      const r = anchorRow + dr;
      if (c < 0 || c > 1 || r < 0 || r > 1) continue;
      const cellEl = document.querySelector(
        `.track-cell[data-track="${trackName}"][data-type-key="${typeKey}"][data-col="${c}"][data-row="${r}"]`
      );
      if (cellEl) cellEl.classList.add('preview-invalid');
    }
    dragState.previewValid  = false;
    dragState.previewTarget = null;
    ghost.classList.remove('ghost-valid', 'ghost-replace', 'ghost-invalid');
    ghost.classList.add('ghost-invalid');
    updateGhostHint(0, true);
    return;
  }

  // Count how many distinct items will be evicted (excluding self)
  const evictedIds = new Set();
  for (const [dc, dr] of item.shape) {
    const existing = tt.grid[anchorRow + dr][anchorCol + dc];
    if (existing && existing !== selfId) evictedIds.add(existing);
  }

  const hasReplace = evictedIds.size > 0;
  const cls = hasReplace ? 'preview-replace' : 'preview-valid';

  for (const [dc, dr] of item.shape) {
    const c = anchorCol + dc;
    const r = anchorRow + dr;
    if (c < 0 || c > 1 || r < 0 || r > 1) continue;
    const cellEl = document.querySelector(
      `.track-cell[data-track="${trackName}"][data-type-key="${typeKey}"][data-col="${c}"][data-row="${r}"]`
    );
    if (cellEl) cellEl.classList.add(cls);
  }

  dragState.previewValid  = true;
  dragState.previewTarget = { track: trackName, typeKey, anchorCol, anchorRow };

  ghost.classList.remove('ghost-valid', 'ghost-replace', 'ghost-invalid');
  ghost.classList.add(hasReplace ? 'ghost-replace' : 'ghost-valid');
  updateGhostHint(evictedIds.size, false);
}

// ── Task 3: Update ghost replace hint text ──
function updateGhostHint(replaceCount, isInvalid) {
  // Remove existing hint
  const existing = ghost.querySelector('.ghost-replace-hint');
  if (existing) existing.remove();

  if (isInvalid) return;
  if (replaceCount > 0) {
    const hint = document.createElement('div');
    hint.className = 'ghost-replace-hint';
    hint.textContent = `↺ 替换 ${replaceCount} 个部件`;
    ghost.appendChild(hint);
  }
}

function startDrag(sourceType, item, sourceSlotId, sourceLoadoutIdx) {
  if (isAnimating) return;
  // Skip any in-progress fly-back animations immediately
  skipAllFlightAnimations();
  dragState.isDragging    = true;
  dragState.sourceType    = sourceType;
  dragState.item          = item;
  dragState.sourceSlotId  = sourceSlotId;
  dragState.sourceLoadout = sourceLoadoutIdx;
  document.body.style.cursor = 'grabbing';
  showGhost(item);
  highlightCandidateColumns(item.type);
  hideTooltip();
}

function endDrag() {
  dragState.isDragging    = false;
  dragState.sourceType    = null;
  dragState.item          = null;
  dragState.sourceSlotId  = null;
  dragState.sourceLoadout = null;
  dragState.pendingEl     = null;
  dragState.pendingItem   = null;
  dragState.pendingSource = null;
  dragState.previewValid  = false;
  dragState.previewTarget = null;
  document.body.style.cursor = '';
  hideGhost();
  clearPreviewHighlights();
  clearCandidateColumns();
  // Clear ghost hint
  const existingHint = ghost.querySelector('.ghost-replace-hint');
  if (existingHint) existingHint.remove();
  document.querySelectorAll('.inv-slot.dragging-source').forEach(el => el.classList.remove('dragging-source'));
  document.querySelector('.inventory-area')?.classList.remove('drop-target-inv');
}

// ── Task 9: cancelDrag — restore original state ──
function cancelDrag() {
  if (!dragState.isDragging && !dragState.pendingEl) { endDrag(); return; }

  // If dragging from overlay, restore item to its original grid position
  if (dragState.isDragging && dragState.sourceType === 'overlay' && dragState.sourceSlotId) {
    const { track, typeKey, anchorCol, anchorRow } = dragState.sourceSlotId;
    const lo = state.loadouts[dragState.sourceLoadout];
    const tt = getTrackTypeData(lo, track, typeKey);
    writeItemToGrid(tt, dragState.item, anchorCol, anchorRow);
    renderAllTracks();
    renderInventory();
  }
  endDrag();
  notify('DRAG CANCELLED');
  // ── Task 6: Assert data/DOM sync after cancel ──
  assertGridDomSync();
}

// ── Task 6: Assert grid data ↔ DOM overlay sync (dev guard) ──
function assertGridDomSync() {
  const lo = currentLoadout();
  // Check shared sail
  const allSlots = [{ track: 'shared', typeKey: 'sail', tt: lo.sail }];
  for (const track of TRACK_KEYS) {
    for (const typeKey of TYPE_KEYS) {
      allSlots.push({ track, typeKey, tt: lo[track][typeKey] });
    }
  }
  for (const { track, typeKey, tt } of allSlots) {
    const containerId = `${track}-slots-${typeKey}`;
    const container = document.getElementById(containerId);
    if (!container) continue;

    // Collect item IDs that should have overlays (from grid data)
    const dataIds = new Set();
    for (let r = 0; r < 2; r++) for (let c = 0; c < 2; c++) {
      const id = tt.grid[r][c];
      if (id) dataIds.add(id);
    }

    // Collect item IDs that actually have overlays in DOM
    const domIds = new Set();
    container.querySelectorAll('.item-overlay').forEach(el => domIds.add(el.dataset.itemId));

    // Check for ghost occupancy (data has id but no overlay)
    for (const id of dataIds) {
      if (!domIds.has(id)) {
        console.warn(`[StarChart] Ghost occupancy detected: ${id} in ${track}/${typeKey} has grid data but no overlay`);
      }
    }
    // Check for ghost overlays (overlay exists but data has no id)
    for (const id of domIds) {
      if (!dataIds.has(id)) {
        console.warn(`[StarChart] Ghost overlay detected: ${id} in ${track}/${typeKey} has overlay but no grid data`);
      }
    }
  }
}

// ── Global mousemove ──
window.addEventListener('mousemove', e => {
  // Pre-threshold detection
  if (dragState.pendingEl && !dragState.isDragging) {
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
      const { sourceType, item, sourceSlotId, sourceLoadoutIdx } = dragState.pendingSource;
      startDrag(sourceType, item, sourceSlotId, sourceLoadoutIdx);

      if (sourceType === 'inventory') {
        dragState.pendingEl.classList.add('dragging-source');
      } else if (sourceType === 'overlay') {
        // Pre-clear the grid so cells show as empty during drag
        const { track, typeKey } = sourceSlotId;
        const lo = state.loadouts[sourceLoadoutIdx];
        const tt = getTrackTypeData(lo, track, typeKey);
        clearItemFromGrid(tt, item.id);
        renderAllTracks();
        renderInventory();
      }
      dragState.pendingEl = null;
    }
  }

  if (!dragState.isDragging) return;
  moveGhost(e.clientX, e.clientY);

  // ── Task 6: Collision detection & preview ──
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const cellEl = target?.closest('.track-cell');
  const invArea = target?.closest('.inventory-area');

  // Resolve track/typeKey from either a cell or an item-overlay sitting on top of cells
  const overlayEl = target?.closest('.item-overlay');
  const trackName = cellEl?.dataset.track   || overlayEl?.dataset.track;
  const typeKey   = cellEl?.dataset.typeKey || overlayEl?.dataset.typeKey;

  if (trackName && typeKey) {
    // Only preview if type matches
    if (typeKey === dragState.item.type) {
      // Always anchor at [0,0] — all shapes in this 2×2 grid start from top-left
      applyPreview(trackName, typeKey, 0, 0);
    } else {
      clearPreviewHighlights();
      ghost.classList.remove('ghost-valid', 'ghost-replace', 'ghost-invalid');
      ghost.classList.add('ghost-invalid');
      updateGhostHint(0, true);
    }
  } else if (invArea && dragState.sourceType === 'overlay') {
    clearPreviewHighlights();
    invArea.classList.add('drop-target-inv');
    ghost.classList.remove('ghost-invalid', 'ghost-replace');
    ghost.classList.add('ghost-valid');
    updateGhostHint(0, false);
  } else {
    clearPreviewHighlights();
    document.querySelector('.inventory-area')?.classList.remove('drop-target-inv');
    ghost.classList.remove('ghost-valid', 'ghost-replace', 'ghost-invalid');
    updateGhostHint(0, false);
  }
});

// ── Task 7: Global mouseup — resolve drop ──
window.addEventListener('mouseup', e => {
  if (!dragState.isDragging) {
    if (dragState.pendingEl) {
      dragState.pendingEl = null;
      dragState.pendingItem = null;
      dragState.pendingSource = null;
    }
    return;
  }

  const target = document.elementFromPoint(e.clientX, e.clientY);
  const cellEl = target?.closest('.track-cell');
  const overlayDropEl = target?.closest('.item-overlay');
  const invArea = target?.closest('.inventory-area');

  const dragItem = dragState.item;
  const srcType  = dragState.sourceType;

  // Accept drop if previewTarget is valid (set during mousemove), regardless of whether
  // the mouse is over a cell or an item-overlay sitting on top of cells
  if ((cellEl || overlayDropEl) && dragState.previewTarget) {
    // ── Drop onto track grid (force-replace logic) ──
    const { track, typeKey, anchorCol, anchorRow } = dragState.previewTarget;

    // Reject if out of bounds (only hard rejection)
    if (shapeExceedsGrid(dragItem.shape, anchorCol, anchorRow)) {
      cancelDrag();
      return;
    }

    // Reject if type mismatch
    if (typeKey !== dragItem.type) {
      cancelDrag();
      return;
    }

    const lo = currentLoadout();
    const tt = getTrackTypeData(lo, track, typeKey);

    // ── Task 4: For same-track moves, the source grid was already pre-cleared in mousemove.
    //    For cross-track moves from overlay, clear source now.
    if (srcType === 'overlay' && dragState.sourceSlotId) {
      const src = dragState.sourceSlotId;
      // Only clear if different track/typeKey (same-track was pre-cleared in mousemove)
      if (src.track !== track || src.typeKey !== typeKey) {
        const srcLo = state.loadouts[dragState.sourceLoadout];
        clearItemFromGrid(getTrackTypeData(srcLo, src.track, src.typeKey), dragItem.id);
      }
    }

    // ── Task 1: Collect evicted items (all items whose cells overlap with new item's shape)
    //    Exclude self (in case of same-track move where grid was pre-cleared, self won't appear)
    const evictedIds = new Set();
    for (const [dc, dr] of dragItem.shape) {
      const existing = tt.grid[anchorRow + dr][anchorCol + dc];
      if (existing && existing !== dragItem.id) evictedIds.add(existing);
    }

    // ── Task 1.3: For each evicted multi-cell item, capture its overlay rect BEFORE clearing
    //    (needed for fly animation in Task 5)
    const evictedEntries = [];
    for (const evId of evictedIds) {
      // Find overlay element before we clear
      const overlayEl = document.querySelector(
        `.item-overlay[data-track="${track}"][data-type-key="${typeKey}"][data-item-id="${evId}"]`
      );
      const rect = overlayEl ? overlayEl.getBoundingClientRect() : null;
      evictedEntries.push({ itemId: evId, rect });
      // Clear ALL cells of this evicted item (including cells not covered by new item)
      clearItemFromGrid(tt, evId);
    }

    // Write new item
    writeItemToGrid(tt, dragItem, anchorCol, anchorRow);

    // ── Task 2: Send evicted items back to inventory (they are no longer in any grid)
    //    evictedIds items are already removed from grid; renderInventory will show them again.
    const evictedNames = evictedEntries.map(e => getItem(e.itemId)?.short || e.itemId);

    if (evictedEntries.length > 0) {
      notify(`REPLACED: ${dragItem.name} ↔ ${evictedNames.join(', ')}`);
    } else {
      notify(`EQUIPPED: ${dragItem.name} → ${track.toUpperCase()} ${typeKey.toUpperCase()}`);
    }

    endDrag();
    renderAllTracks();
    renderInventory();

    // ── Task 6: Assert data/DOM sync after successful replace ──
    assertGridDomSync();

    // ── Task 5: Trigger fly-back animations for evicted items ──
    if (evictedEntries.length > 0) {
      evictedEntries.forEach((entry, idx) => {
        setTimeout(() => flyItemToInventory(entry.itemId, entry.rect), idx * 50);
      });
    }

    // Snap-in animation on the overlay
    const overlayEl = document.querySelector(
      `.item-overlay[data-track="${track}"][data-type-key="${typeKey}"][data-item-id="${dragItem.id}"]`
    );
    if (overlayEl) {
      overlayEl.style.animation = 'none';
      void overlayEl.offsetWidth;
      overlayEl.style.animation = 'snapIn 0.18s cubic-bezier(0.2,0,0.4,1) forwards';
      setTimeout(() => { if (overlayEl) overlayEl.style.animation = ''; }, 200);
    }

  } else if (invArea && srcType === 'overlay') {
    // ── Task 8: Drag from overlay → drop on inventory → unequip ──
    // Grid was already pre-cleared in mousemove
    notify(`UNEQUIPPED: ${dragItem.name}`);
    endDrag();
    renderAllTracks();
    renderInventory();

  } else {
    // Invalid drop — cancel (restore)
    cancelDrag();
  }
});

// ── Inventory item mousedown ──
function bindInvItemDrag(el, item) {
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    dragState.startX      = e.clientX;
    dragState.startY      = e.clientY;
    // Keep grab point exactly where mouse clicked inside the inventory slot
    dragState.grabOffsetX = e.clientX - rect.left;
    dragState.grabOffsetY = e.clientY - rect.top;
    dragState.pendingEl = el;
    dragState.pendingItem = item;
    dragState.pendingSource = {
      sourceType: 'inventory',
      item,
      sourceSlotId: null,
      sourceLoadoutIdx: state.currentLoadout,
    };
  });
}

// ── Window blur: cancel drag ──
window.addEventListener('blur', () => {
  if (dragState.isDragging || dragState.pendingEl) cancelDrag();
});


// The loadout card is a sticker on a rolling pin viewed from above.
// 'next' = slide up & fade out, new one slides in from below.
// 'prev' = slide down & fade out, new one slides in from above.
let isAnimating = false;

function switchLoadout(direction) {
  if (isAnimating) return;
  isAnimating = true;

  const card = document.getElementById('loadoutCard');
  const outClass = direction === 'next' ? 'roll-out-forward'  : 'roll-out-backward';
  const inClass  = direction === 'next' ? 'roll-in-forward'   : 'roll-in-backward';
  const DURATION = 260; // ms — must match CSS animation duration

  // Phase 1: roll current card out
  card.classList.remove('roll-out-forward','roll-out-backward','roll-in-forward','roll-in-backward');
  card.classList.add(outClass);

  setTimeout(() => {
    // Switch data while card is invisible
    card.classList.remove(outClass);
    const total = state.loadouts.length;
    state.currentLoadout = direction === 'next'
      ? (state.currentLoadout + 1) % total
      : (state.currentLoadout - 1 + total) % total;
    // Cancel any in-progress drag when switching loadout
    if (dragState.isDragging) endDrag();

    updateLoadoutHeader();
    renderAllTracks();
    renderInventory();

    // Phase 2: roll new card in
    // Force reflow so the browser registers the class removal before adding the new one
    void card.offsetWidth;
    card.classList.add(inClass);

    setTimeout(() => {
      card.classList.remove(inClass);
      isAnimating = false;
    }, DURATION);

    notify(`LOADOUT: ${currentLoadout().name}`);
  }, DURATION);
}

document.getElementById('btn-prev').addEventListener('click', () => switchLoadout('prev'));
document.getElementById('btn-next').addEventListener('click', () => switchLoadout('next'));

// ── Filter ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.activeFilter = btn.dataset.filter;
    renderInventory();
  });
});

// ── Action buttons ──
document.getElementById('btn-save').addEventListener('click', () => {
  notify(`CONFIG SAVED: ${currentLoadout().name}`);
});
document.getElementById('btn-rename').addEventListener('click', () => {
  const newName = prompt('Enter loadout name:', currentLoadout().name);
  if (newName && newName.trim()) {
    currentLoadout().name = newName.trim().toUpperCase();
    updateLoadoutHeader();
    notify(`RENAMED TO: ${currentLoadout().name}`);
  }
});
document.getElementById('btn-delete').addEventListener('click', () => {
  if (state.loadouts.length <= 1) { notify('⚠ CANNOT DELETE LAST LOADOUT'); return; }
  const name = currentLoadout().name;
  state.loadouts.splice(state.currentLoadout, 1);
  state.currentLoadout = Math.min(state.currentLoadout, state.loadouts.length - 1);
  updateLoadoutHeader();
  renderAllTracks();
  renderInventory();
  notify(`DELETED: ${name}`);
});

// ── Close ──
document.querySelector('.header-close').addEventListener('click', () => {
  notify('PANEL CLOSED (prototype — refresh to reopen)');
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'PageUp'   || e.key === 'q' || e.key === 'Q') switchLoadout('prev');
  if (e.key === 'PageDown' || e.key === 'e' || e.key === 'E') switchLoadout('next');
  if (e.key === 'Escape') {
    cancelDrag();
  }
});

// ── Track hover highlight ──
['primary','secondary'].forEach(t => {
  const el = document.getElementById(`track-${t}`);
  if (el) {
    el.addEventListener('mouseenter', () => el.style.background = 'rgba(0,229,255,0.05)');
    el.addEventListener('mouseleave', () => el.style.background = '');
  }
});

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════

const tooltip = document.getElementById('tooltip');
let ttTimer = null;

function showTooltip(e, item, equipped) {
  clearTimeout(ttTimer);
  ttTimer = setTimeout(() => {
    document.getElementById('tt-icon').textContent = item.icon;
    document.getElementById('tt-name').textContent = item.name;
    const typeEl = document.getElementById('tt-type');
    typeEl.textContent = `STAR ${item.type.toUpperCase()}`;
    typeEl.className = `tt-type ${item.type}`;

    document.getElementById('tt-stats').innerHTML = item.stats.map(s => `
      <div class="tt-stat">
        <span class="tt-arrow ${s.d==='+' ? 'arr-up' : s.d==='-' ? 'arr-down' : ''}">${s.d==='+' ? '▲' : s.d==='-' ? '▼' : '—'}</span>
        <span class="tt-label">${s.l}</span>
        <span class="tt-val">${s.v}</span>
      </div>`).join('');

    document.getElementById('tt-desc').textContent = item.desc;

    const tagEl  = document.getElementById('tt-eq-tag');
    const hintEl = document.getElementById('tt-hint');
    if (equipped) {
      const loc = getEquippedLocation(item.id);
      tagEl.innerHTML = `<div class="tt-eq-tag">✓ EQUIPPED · ${loc || ''}</div>`;
      hintEl.textContent = 'Drag to move or drag to inventory to unequip';
    } else {
      tagEl.innerHTML = '';
      hintEl.textContent = 'Drag to a slot to equip';
    }

    moveTooltip(e);
    tooltip.classList.add('visible');
  }, 150);
}

function moveTooltip(e) {
  const W = 230, H = 220;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + W > window.innerWidth)  x = e.clientX - W - 8;
  if (y + H > window.innerHeight) y = e.clientY - H - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  clearTimeout(ttTimer);
  tooltip.classList.remove('visible');
}

// ═══════════════════════════════════════════════════════
// NOTIFICATION
// ═══════════════════════════════════════════════════════

let notifTimer = null;
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

updateLoadoutHeader();
renderAllTracks();
renderInventory();
</script>
</body>
</html>
